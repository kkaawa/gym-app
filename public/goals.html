<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYM LOG - 目標設定</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .goal-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .goal-name {
      font-size: 18px;
      font-weight: bold;
      color: #eee;
    }
    .goal-actions { display: flex; gap: 8px; }
    .goal-info {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }
    .goal-progress-label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <div id="nav"></div>

  <div class="page">
    <h1>目標設定</h1>
    <div id="message"></div>

    <!-- 目標追加フォーム -->
    <div style="margin-bottom:32px;">
      <h2>新しい目標を追加</h2>
      <form id="goal-form">
        <!-- ① 部位選択 -->
        <div>
          <label>部位</label>
          <select id="category-select">
            <option value="">部位を選択してください</option>
            <option value="胸">胸</option>
            <option value="肩">肩</option>
            <option value="足">足</option>
            <option value="腕">腕</option>
            <option value="背中">背中</option>
            <option value="free">自由入力</option>
          </select>
        </div>

        <!-- ② 種目選択 -->
        <div id="exercise-select-area" style="display:none;">
          <label>種目</label>
          <select id="exercise-select">
            <option value="">種目を選択してください</option>
          </select>
        </div>

        <!-- ③ 自由入力 -->
        <div id="exercise-free-area" style="display:none;">
          <label>種目（自由入力）</label>
          <input type="text" id="exercise-free" placeholder="例: ケーブルクロスオーバー">
        </div>

        <input type="hidden" id="syumoku">
        <div>
          <label>目標重量（kg）</label>
          <input type="number" id="target_weight" step="0.5" min="0" placeholder="例: 100" required>
        </div>
        <div>
          <label>達成目標日</label>
          <input type="date" id="target_date" required>
        </div>
        <button type="submit" class="btn btn-primary">目標を追加する</button>
      </form>
    </div>

    <!-- 目標一覧 -->
    <h2>目標一覧</h2>
    <div id="goals-container">読み込み中...</div>
  </div>

  <script src="js/exercises.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/goals.js"></script>
</body>
</html>
