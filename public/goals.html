<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GYM LOG - 目標設定</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .goal-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .goal-name {
      font-size: 18px;
      font-weight: bold;
      color: #eee;
    }
    .goal-actions { display: flex; gap: 8px; }
    .goal-info {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }
    .goal-progress-label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <div id="nav"></div>

  <div class="page">
    <h1>目標設定</h1>
    <div id="message"></div>

    <!-- 目標追加フォーム -->
    <div style="margin-bottom:32px;">
      <h2>新しい目標を追加</h2>
      <form id="goal-form">
        <div>
          <label>種目</label>
          <input type="text" id="syumoku" list="syumoku-list" placeholder="種目を選択または入力" required>
          <datalist id="syumoku-list">
            <option value="ベンチプレス">
            <option value="スクワット">
            <option value="デッドリフト">
            <option value="ショルダープレス">
            <option value="ラットプルダウン">
            <option value="懸垂">
            <option value="アームカール">
            <option value="トライセプスプレスダウン">
            <option value="レッグプレス">
          </datalist>
        </div>
        <div>
          <label>目標重量（kg）</label>
          <input type="number" id="target_weight" step="0.5" min="0" placeholder="例: 100" required>
        </div>
        <div>
          <label>達成目標日</label>
          <input type="date" id="target_date" required>
        </div>
        <button type="submit" class="btn btn-primary">目標を追加する</button>
      </form>
    </div>

    <!-- 目標一覧 -->
    <h2>目標一覧</h2>
    <div id="goals-container">読み込み中...</div>
  </div>

  <script src="/js/nav.js"></script>
  <script src="/js/goals.js"></script>
</body>
</html>
