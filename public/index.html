<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYM LOG - ダッシュボード</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ナビゲーションバー（nav.jsが自動で挿入） -->
  <div id="nav"></div>

  <div class="page">
    <h1>ダッシュボード</h1>

    <!-- 数値カード（今日・今月・累計） -->
    <div class="card-grid">
      <div class="stat-card">
        <div class="label">今日のセット数</div>
        <div class="value" id="today-sets">-</div>
      </div>
      <div class="stat-card">
        <div class="label">今日の総ボリューム</div>
        <div class="value" id="today-volume">-</div>
        <span class="unit">kg</span>
      </div>
      <div class="stat-card">
        <div class="label">今月のトレーニング日数</div>
        <div class="value" id="month-days">-</div>
        <span class="unit">日</span>
      </div>
      <div class="stat-card">
        <div class="label">今月の総ボリューム</div>
        <div class="value" id="month-volume">-</div>
        <span class="unit">kg</span>
      </div>
      <div class="stat-card">
        <div class="label">累計トレーニング日数</div>
        <div class="value" id="total-days">-</div>
        <span class="unit">日</span>
      </div>
    </div>

    <!-- 今週の曜日バッジ -->
    <div class="card">
      <h2>今週のトレーニング</h2>
      <div class="week-badges" id="week-badges">読み込み中...</div>
    </div>
  </div>

  <script src="/js/nav.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
