<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYM LOG - 記録入力</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div id="nav"></div>

  <div class="page">
    <h1>記録入力</h1>

    <!-- 送信後のメッセージ表示エリア -->
    <div id="message"></div>

    <form id="record-form">

      <div>
        <label for="date">日付</label>
        <input type="date" id="date" required>
      </div>

      <div>
        <label for="training-type">今日は何の日</label>
        <select id="training-type">
          <option value="">選択してください（任意）</option>
          <option value="胸">胸 — CHEST</option>
          <option value="背中">背中 — BACK</option>
          <option value="肩">肩 — SHOULDER</option>
          <option value="腕">腕 — ARMS</option>
          <option value="足">足 — LEGS</option>
          <option value="全身">全身 — FULL BODY</option>
        </select>
      </div>

      <!-- ① 部位を選ぶ -->
      <div>
        <label for="category-select">部位</label>
        <select id="category-select">
          <option value="">部位を選択してください</option>
          <option value="胸">胸</option>
          <option value="肩">肩</option>
          <option value="足">足</option>
          <option value="腕">腕</option>
          <option value="背中">背中</option>
          <option value="free">自由入力</option>
        </select>
      </div>

      <!-- ② 部位を選んだら種目が出る -->
      <div id="exercise-select-area" style="display:none;">
        <label for="exercise-select">種目</label>
        <select id="exercise-select">
          <option value="">種目を選択してください</option>
        </select>
      </div>

      <!-- ③ 自由入力を選んだら表示 -->
      <div id="exercise-free-area" style="display:none;">
        <label for="exercise-free">種目（自由入力）</label>
        <input type="text" id="exercise-free" placeholder="例: ケーブルクロスオーバー">
      </div>

      <!-- 実際に送信される種目名（JSがセットする） -->
      <input type="hidden" id="syumoku">

      <div>
        <label for="omosa">重量（kg）</label>
        <input type="number" id="omosa" step="0.5" min="0" placeholder="例: 60" required>
      </div>

      <div>
        <label for="reps">回数</label>
        <input type="number" id="reps" min="1" placeholder="例: 10" required>
      </div>

      <div>
        <label for="memo">メモ（任意）</label>
        <textarea id="memo" rows="3" placeholder="フォームの注意点など..."></textarea>
      </div>

      <div>
        <label>
          <input type="checkbox" id="oikomi">
          追い込みセット（限界まで追い込んだセット）
        </label>
      </div>

      <button type="submit" class="btn btn-primary">記録を保存する</button>

      <!-- ボタンの直下にもメッセージを表示 -->
      <div id="message-bottom"></div>
    </form>
  </div>

  <script src="/js/exercises.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/input.js"></script>
</body>
</html>
