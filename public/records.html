<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GYM LOG - 記録一覧</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* 記録一覧専用のスタイル */
    .record-group { margin-bottom: 32px; }

    .record-group-date {
      font-size: 18px;
      font-weight: bold;
      color: #f0a500;
      margin-bottom: 12px;
      padding-bottom: 4px;
      border-bottom: 1px solid #333;
    }

    .record-item {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .record-info { flex: 1; }
    .record-name { font-size: 16px; font-weight: bold; }
    .record-detail { font-size: 13px; color: #999; margin-top: 4px; }

    .record-actions { display: flex; gap: 8px; }

    /* 編集モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 28px;
      width: 100%;
      max-width: 460px;
    }
    .modal h2 { margin-bottom: 20px; color: #f0a500; }
  </style>
</head>
<body>

  <div id="nav"></div>

  <div class="page">
    <h1>記録一覧</h1>
    <div id="message"></div>

    <!-- 表示切替ボタン -->
    <div style="display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap;">
      <button class="btn btn-primary filter-btn active" data-filter="date">日付ごと</button>
      <button class="btn btn-secondary filter-btn" data-filter="exercise">種目ごと</button>
      <button class="btn btn-secondary filter-btn" data-filter="calendar">これまでのトレーニング記録</button>
    </div>

    <!-- 日付ごと：カレンダーで日付選択 -->
    <div id="filter-date-area" style="margin-bottom:20px;">
      <input type="date" id="filter-date" style="width:200px;">
    </div>

    <!-- 種目ごと：プルダウンで種目選択 -->
    <div id="filter-exercise-area" style="margin-bottom:20px; display:none;">
      <select id="filter-exercise" style="width:240px;">
        <option value="">種目を選択してください</option>
      </select>
    </div>

    <!-- これまでの記録：月間カレンダー -->
    <div id="filter-calendar-area" style="display:none; margin-bottom:20px;">
      <div id="calendar-container"></div>
    </div>

    <div id="records-container">読み込み中...</div>
  </div>

  <!-- 編集モーダル -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h2>記録を編集</h2>
      <form id="edit-form" style="gap:12px;">
        <input type="hidden" id="edit-id">
        <div>
          <label>日付</label>
          <input type="date" id="edit-date" required>
        </div>
        <div>
          <label>種目</label>
          <input type="text" id="edit-syumoku" required>
        </div>
        <div>
          <label>重量（kg）</label>
          <input type="number" id="edit-omosa" step="0.5" required>
        </div>
        <div>
          <label>回数</label>
          <input type="number" id="edit-reps" required>
        </div>
        <div>
          <label>メモ</label>
          <textarea id="edit-memo" rows="2"></textarea>
        </div>
        <div>
          <label>
            <input type="checkbox" id="edit-oikomi">
            追い込みセット
          </label>
        </div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button type="submit" class="btn btn-primary">保存</button>
          <button type="button" class="btn btn-secondary" id="modal-close">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/exercises.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/records.js"></script>
</body>
</html>
